name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - run: npm ci
      # Audit only the code we ship — dev-only build tooling (electron-builder
      # and its transitive deps) isn't part of the runtime app.
      - run: npm audit --omit=dev --audit-level=high
      - run: npm test
