name: Build desktop installers

# Builds the JobPilot desktop apps for macOS and Windows.
#   • Push a version tag (e.g. v0.1.0) → builds both and publishes them to a
#     GitHub Release (which also feeds the app's auto-updater).
#   • Run manually (Actions → this workflow → Run workflow) → builds both and
#     uploads the installers as downloadable artifacts, without a release.
#
# The builds are UNSIGNED (CSC_IDENTITY_AUTO_DISCOVERY: false):
#   • Windows: users click "More info → Run anyway" once (SmartScreen).
#   • macOS: right-click the app → Open (or `xattr -cr /Applications/JobPilot.app`)
#     the first time. To remove these prompts, add signing later — a Windows
#     code-signing cert and/or the Apple Developer Program ($99/yr) for
#     Developer ID + notarization.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write  # needed to create/update the Release on tag builds

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate app icon
        run: npm run make-icon

      - name: Build ${{ matrix.platform }} installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Build unsigned — see the header note.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: >
          npx electron-builder --${{ matrix.platform }}
          ${{ startsWith(github.ref, 'refs/tags/') && '--publish always' || '--publish never' }}

      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jobpilot-${{ matrix.platform }}
          if-no-files-found: ignore
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
